<script>
        const navContainer = document.getElementById('nav-container');
        const contentDisplay = document.getElementById('content-display');

        // 1. Initialize Application
        function initApp() {
            // Generate Sidebar Buttons from the Book Data
            wordBookData.forEach((chapter, index) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn note-nav-btn';
                // Shortens the sidebar title to just "Chapter 1" etc.
                btn.innerHTML = `📘 ${chapter.title.split(':')[0]}`; 
                btn.onclick = () => loadContent(index, btn);
                navContainer.appendChild(btn);
            });
            loadDashboard(); // Start on home screen
        }

        // 2. Load Dashboard (Home Grid)
        function loadDashboard() {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('home-btn').classList.add('active');

            let html = `
            <div class="content-wrapper allow-select">
                <div class="hero">
                    <h1>MS Word Complete Guide</h1>
                    <p>Select a chapter below to start reading.</p>
                </div>
                <div class="dashboard-grid">`;
            
            // Generate a card for every chapter
            wordBookData.forEach((chapter, index) => {
                html += `
                    <div class="module-card" onclick="document.querySelectorAll('.note-nav-btn')[${index}].click()">
                        <div class="card-icon">📖</div>
                        <h3>${chapter.title}</h3>
                        <span>${chapter.topics.length} Topics inside</span>
                    </div>`;
            });

            html += `</div></div>`;
            contentDisplay.innerHTML = html;
            contentDisplay.scrollTop = 0;
        }

        // 3. Load Specific Chapter Content
        function loadContent(index, clickedBtn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(clickedBtn) clickedBtn.classList.add('active');

            const chapter = wordBookData[index];

            // Build HTML for the Chapter
            let htmlContent = `
            <div class="content-wrapper">
                <div class="note-section allow-select">
                    <h1>${chapter.title}</h1>`;
            
            // Loop through all the topics inside this chapter
            chapter.topics.forEach(topic => {
                htmlContent += `<h3>${topic.heading}</h3>`;
                htmlContent += `<p>${topic.text}</p>`;
                
                if(topic.imgSrc) {
                    htmlContent += `<img src="${topic.imgSrc}" alt="${topic.heading}" onclick="openLightbox(this.src)">`;
                    htmlContent += `<div class="img-caption">Figure: ${topic.heading}</div>`;
                }
            });
            htmlContent += `</div></div>`;
            
            contentDisplay.innerHTML = htmlContent;
            contentDisplay.scrollTop = 0;
        }

        // 4. Lightbox (Image Zoom) Logic
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        // 5. Drag-to-Scroll Logic
        let isDown = false;
        let startY;
        let scrollTop;

        contentDisplay.addEventListener('mousedown', (e) => {
            if(e.target.closest('.module-card') || e.target.tagName === 'IMG') return;
            isDown = true;
            startY = e.pageY - contentDisplay.offsetTop;
            scrollTop = contentDisplay.scrollTop;
            let noteSec = contentDisplay.querySelector('.note-section');
            if(noteSec) noteSec.classList.remove('allow-select');
        });

        contentDisplay.addEventListener('mouseleave', () => {
            isDown = false;
            let noteSec = contentDisplay.querySelector('.note-section');
            if(noteSec) noteSec.classList.add('allow-select');
        });

        contentDisplay.addEventListener('mouseup', () => {
            isDown = false;
            let noteSec = contentDisplay.querySelector('.note-section');
            if(noteSec) noteSec.classList.add('allow-select');
        });

        contentDisplay.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const y = e.pageY - contentDisplay.offsetTop;
            const walk = (y - startY) * 2; 
            contentDisplay.scrollTop = scrollTop - walk;
        });

        // Run application on load
        window.onload = initApp;
    </script>
